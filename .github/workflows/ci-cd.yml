name: ETL Pipeline CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install flake8 pytest pytest-cov pandas pyarrow pyyaml
      - name: Lint
        run: flake8 src/ dags/ --max-line-length=120 --ignore=E501,W503,E402,F401,F541,F841
      - name: Run tests
        run: PYTHONPATH=src pytest tests/ -v --tb=short

  validate-dag:
    name: Validate Airflow DAGs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Check DAG syntax
        run: |
          python -c "
          import ast
          with open('dags/etl_pipeline_dag.py') as f:
              ast.parse(f.read())
          print('DAG syntax OK')
          "

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [lint-and-test, validate-dag]
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - run: echo "Staging deploy triggered"

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint-and-test, validate-dag]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: echo "Production deploy triggered"
