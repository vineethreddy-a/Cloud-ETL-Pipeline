name: ETL Pipeline CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov pandas pyarrow pyyaml

      - name: Lint with flake8
        run: |
          flake8 src/ dags/ --max-line-length=120 --ignore=E501,W503,E402,F401

      - name: Run unit tests
        run: |
          PYTHONPATH=src pytest tests/ -v --tb=short

      - name: Upload coverage report
        if: always()
        run: echo "Tests complete"

  validate-dag:
    name: Validate Airflow DAGs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Airflow
        run: |
          pip install "apache-airflow==2.8.1" --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.8.1/constraints-3.11.txt"

      - name: Check DAG syntax
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'src')
          import ast, os
          dag_file = 'dags/etl_pipeline_dag.py'
          with open(dag_file) as f:
              source = f.read()
          ast.parse(source)
          print('DAG syntax OK:', dag_file)
          "

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [lint-and-test, validate-dag]
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - uses: actions/checkout@v4
      - name: Deploy notification
        run: echo "Staging deploy triggered for ${{ github.sha }}"

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint-and-test, validate-dag]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4
      - name: Deploy notification
        run: echo "Production deploy triggered for ${{ github.sha }}"
